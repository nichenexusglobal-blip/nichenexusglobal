<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Web Pairing QR Code</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f0f2f5;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #075e54;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #667781;
            margin-bottom: 24px;
        }
        #qrcode {
            display: inline-block;
            padding: 16px;
            background: white;
            border: 2px solid #e9edef;
            border-radius: 8px;
        }
        #qrcode img {
            display: block;
        }
        .pairing-code {
            margin-top: 20px;
            font-family: monospace;
            font-size: 14px;
            color: #667781;
            word-break: break-all;
        }
        .instructions {
            margin-top: 20px;
            color: #667781;
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>WhatsApp Web Pairing</h1>
        <p class="subtitle">Scan this QR code with your WhatsApp app</p>
        <div id="qrcode"></div>
        <div class="pairing-code">Pairing Code: 4G6B47R2XXXVR2UAYSFPU5M6FF</div>
        <div class="instructions">
            Open WhatsApp on your phone &rarr; Linked Devices &rarr; Link a Device<br>
            Scan the QR code above to connect
        </div>
    </div>

    <script>
        new QRCode(document.getElementById("qrcode"), {
            text: "4G6B47R2XXXVR2UAYSFPU5M6FF",
            width: 256,
            height: 256,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.L
        });
    </script>
</body>
</html>
