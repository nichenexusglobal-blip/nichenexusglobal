<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WhatsApp QR Code</title>
<style>
  body{background:#0d1117;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;font-family:sans-serif}
  .card{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:40px;text-align:center;max-width:520px}
  h2{color:#25D366;margin:0 0 8px 0}
  .sub{color:#8b949e;font-size:14px;margin-bottom:20px}
  img{background:#fff;border-radius:12px;padding:16px;max-width:280px;height:auto}
  .steps{color:#8b949e;font-size:13px;margin-top:20px;text-align:left;line-height:1.8}
  .steps strong{color:#c9d1d9}
  .tip{color:#f0883e;font-size:13px;margin-top:12px}
</style>
</head>
<body>
<div class="card">
  <h2>🔗 WhatsApp Bridge</h2>
  <p class="sub">Scan this QR with your phone to link</p>
  <img src="whatsapp_qr.png" alt="WhatsApp QR Code">
  <div class="steps">
    <strong>步骤：</strong><br>
    1. 打开手机 WhatsApp<br>
    2. Linked Devices → Link a Device<br>
    3. 扫描上面的二维码<br>
    4. 等 ✅ Connected
  </div>
  <div class="tip">⚠️ QR码每1分钟自动刷新，如果过期了等几秒再刷新页面</div>
</div>
</body>
</html>
