<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta http-equiv="refresh" content="10">
<title>WhatsApp QR 扫码连接</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:20px}
.card{background:#161b22;border:1px solid #30363d;border-radius:20px;padding:40px 30px;text-align:center;max-width:480px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
h1{color:#25D366;font-size:24px;margin-bottom:6px}
.sub{color:#8b949e;font-size:14px;margin-bottom:20px;line-height:1.5}
#qr-container{background:#fff;border-radius:14px;padding:16px;display:inline-block;margin:0 auto 16px;min-width:300px;min-height:300px;display:flex;align-items:center;justify-content:center}
#qr-container canvas,#qr-container img{max-width:280px;max-height:280px;display:block}
#qr-container.loading::after{content:'⏳ 加载QR码中...';color:#8b949e;font-size:14px}
.status{font-size:14px;margin:10px 0;padding:10px 16px;border-radius:8px;background:#0d1117}
.status.loading{color:#f0883e;border:1px solid #30363d}
.status.ready{color:#25D366;border:1px solid #25D36633}
.status.error{color:#f85149;border:1px solid #f8514933}
.steps{color:#8b949e;font-size:13px;text-align:left;margin-top:16px;padding:16px;background:#0d1117;border-radius:10px;line-height:2}
.steps strong{color:#c9d1d9}
.qr-data{color:#484f58;font-size:10px;margin-top:12px;word-break:break-all;max-height:60px;overflow:hidden;opacity:0.6}
button{background:#238636;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer;margin-top:12px}
button:hover{background:#2ea043}
</style>
</head>
<body>
<div class="card">
  <h1>📱 WhatsApp Bridge</h1>
  <p class="sub">Scan this QR code with your phone to link WhatsApp</p>
  <div id="qr-container" class="loading"></div>
  <div id="status" class="status loading">⏳ 等待QR数据...</div>
  <div class="steps">
    <strong>步骤：</strong><br>
    1. 打开手机 WhatsApp<br>
    2. 点 Linked Devices → Link a Device<br>
    3. 扫描上面的二维码<br>
    4. 等待显示 ✅ Connected
  </div>
  <div id="qr-data-display" class="qr-data"></div>
  <button onclick="location.reload()">🔄 刷新</button>
</div>

<script>
// Inline QR Code Generator (minimal QR generator)
// QR Code generation - type 2 (matrix 25x25 for version 2-7 auto)
var QR = {};

QR.QRErrorCorrectLevel = { L: 1, M: 0, Q: 3, H: 2 };

QR.QRCode = function(typeNumber, errorCorrectLevel) {
  this.typeNumber = typeNumber;
  this.errorCorrectLevel = errorCorrectLevel;
  this.modules = null;
  this.moduleCount = 0;
  this.dataCache = null;
  this.dataList = [];
};

QR.QRCode.prototype = {
  addData: function(data) { this.dataList.push(new QR.QR8bitByte(data)); this.dataCache = null; },
  isDark: function(row, col) {
    if (row < 0 || this.moduleCount <= row || col < 0 || this.moduleCount <= col) return false;
    return this.modules[row][col];
  },
  getModuleCount: function() { return this.moduleCount; },
  make: function() {
    this._makeImpl(false, this.getBestMaskPattern());
  },
  _makeImpl: function(test, maskPattern) {
    this.moduleCount = this.typeNumber * 4 + 17;
    this.modules = new Array(this.moduleCount);
    for (var row = 0; row < this.moduleCount; row++) {
      this.modules[row] = new Array(this.moduleCount);
      for (var col = 0; col < this.moduleCount; col++) this.modules[row][col] = null;
    }
    this._setupPositionProbePattern(0, 0);
    this._setupPositionProbePattern(this.moduleCount - 7, 0);
    this._setupPositionProbePattern(0, this.moduleCount - 7);
    this._setupPositionAdjustPattern();
    this._setupTimingPattern();
    this._setupTypeInfo(test, maskPattern);
    if (this.typeNumber >= 7) this._setupTypeNumber(test);
    if (this.dataCache == null) this.dataCache = QR.QRCode._createData(this.typeNumber, this.errorCorrectLevel, this.dataList);
    this._mapData(this.dataCache, maskPattern);
  },
  _setupPositionProbePattern: function(row, col) {
    for (var r = -1; r <= 7; r++) {
      for (var c = -1; c <= 7; c++) {
        if (row + r <= -1 || this.moduleCount <= row + r || col + c <= -1 || this.moduleCount <= col + c) continue;
        this.modules[row + r][col + c] = 
          (0 <= r && r <= 6 && (c == 0 || c == 6)) ||
          (0 <= c && c <= 6 && (r == 0 || r == 6)) ||
          (2 <= r && r <= 4 && 2 <= c && c <= 4);
      }
    }
  },
  _getBestMaskPattern: function() {
    var minLostPoint = 0, pattern = 0;
    for (var i = 0; i < 8; i++) {
      this._makeImpl(true, i);
      var lostPoint = QR.QRCode._getLostPoint(this);
      if (i == 0 || minLostPoint > lostPoint) { minLostPoint = lostPoint; pattern = i; }
    }
    return pattern;
  },
  _setupTimingPattern: function() {
    for (var r = 8; r < this.moduleCount - 8; r++) if (this.modules[r][6] == null) this.modules[r][6] = r % 2 == 0;
    for (var c = 8; c < this.moduleCount - 8; c++) if (this.modules[6][c] == null) this.modules[6][c] = c % 2 == 0;
  },
  _setupPositionAdjustPattern: function() {
    var pos = QR.QRCode.PATTERN_POSITION_TABLE[this.typeNumber - 1];
    if (pos == null) return;
    for (var i = 0; i < pos.length; i++) {
      for (var j = 0; j < pos.length; j++) {
        var row = pos[i], col = pos[j];
        if (this.modules[row][col] != null) continue;
        for (var r = -2; r <= 2; r++) {
          for (var c = -2; c <= 2; c++) {
            this.modules[row + r][col + c] = r == -2 || r == 2 || c == -2 || c == 2 || (r == 0 && c == 0);
          }
        }
      }
    }
  },
  _setupTypeNumber: function(test) {
    var bits = QR.QRCode._getBCHTypeNumber(this.typeNumber);
    for (var i = 0; i < 18; i++) {
      var mod = (!test && ((bits >> i) & 1) == 1);
      this.modules[Math.floor(i / 3)][i % 3 + this.moduleCount - 8 - 3] = mod;
    }
    for (var i = 0; i < 18; i++) {
      var mod = (!test && ((bits >> i) & 1) == 1);
      this.modules[i % 3 + this.moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
    }
  },
  _setupTypeInfo: function(test, maskPattern) {
    var data = (this.errorCorrectLevel << 3) | maskPattern;
    var bits = QR.QRCode._getBCHTypeInfo(data);
    for (var i = 0; i < 15; i++) {
      var mod = (!test && ((bits >> i) & 1) == 1);
      if (i < 6) this.modules[i][8] = mod;
      else if (i < 8) this.modules[i + 1][8] = mod;
      else this.modules[this.moduleCount - 15 + i][8] = mod;
    }
    for (var i = 0; i < 15; i++) {
      var mod = (!test && ((bits >> i) & 1) == 1);
      if (i < 8) this.modules[8][this.moduleCount - i - 1] = mod;
      else if (i < 9) this.modules[8][15 - i - 1 + 1] = mod;
      else this.modules[8][15 - i - 1] = mod;
    }
    this.modules[this.moduleCount - 8][8] = !test;
  },
  _mapData: function(data, maskPattern) {
    var inc = -1, row = this.moduleCount - 1, bitIndex = 7, byteIndex = 0;
    for (var col = this.moduleCount - 1; col > 0; col -= 2) {
      if (col == 6) col--;
      while (true) {
        for (var c = 0; c < 2; c++) {
          if (this.modules[row][col - c] == null) {
            var dark = false;
            if (byteIndex < data.length) dark = ((data[byteIndex] >>> bitIndex) & 1) == 1;
            var mask = QR.QRCode._getMask(maskPattern, row, col - c);
            if (mask) dark = !dark;
            this.modules[row][col - c] = dark;
            bitIndex--;
            if (bitIndex == -1) { byteIndex++; bitIndex = 7; }
          }
        }
        row += inc;
        if (row < 0 || this.moduleCount <= row) { row -= inc; inc = -inc; break; }
      }
    }
  }
};

QR.QRCode._getMask = function(maskPattern, i, j) {
  switch (maskPattern) {
    case 0: return (i + j) % 2 == 0;
    case 1: return i % 2 == 0;
    case 2: return j % 3 == 0;
    case 3: return (i + j) % 3 == 0;
    case 4: return (Math.floor(i / 2) + Math.floor(j / 3)) % 2 == 0;
    case 5: return (i * j) % 2 + (i * j) % 3 == 0;
    case 6: return ((i * j) % 2 + (i * j) % 3) % 2 == 0;
    case 7: return ((i * j) % 3 + (i + j) % 2) % 2 == 0;
    default: return false;
  }
};

QR.QRCode._getBCHTypeInfo = function(data) {
  var d = data << 10;
  while (QR.QRCode._getBCHDigit(d) - QR.QRCode._getBCHDigit(QR.QRCode.G15) >= 0) {
    d ^= (QR.QRCode.G15 << (QR.QRCode._getBCHDigit(d) - QR.QRCode._getBCHDigit(QR.QRCode.G15)));
  }
  return ((data << 10) | d) ^ QR.QRCode.G15_MASK;
};

QR.QRCode._getBCHTypeNumber = function(data) {
  var d = data << 12;
  while (QR.QRCode._getBCHDigit(d) - QR.QRCode._getBCHDigit(QR.QRCode.G18) >= 0) {
    d ^= (QR.QRCode.G18 << (QR.QRCode._getBCHDigit(d) - QR.QRCode._getBCHDigit(QR.QRCode.G18)));
  }
  return (data << 12) | d;
};

QR.QRCode._getBCHDigit = function(data) {
  var digit = 0;
  while (data != 0) { digit++; data >>>= 1; }
  return digit;
};

QR.QRCode.G15 = 0b10100110111;
QR.QRCode.G15_MASK = 0b100010010100101;
QR.QRCode.G18 = 0b1111100001001001;

QR.QR8bitByte = function(data) { this.mode = QR.QRMode.MODE_8BIT_BYTE; this.data = data; };
QR.QR8bitByte.prototype = {
  getLength: function() { return this.data.length; },
  write: function(bitBuffer) {
    for (var i = 0; i < this.data.length; i++) {
      bitBuffer.put(this.data.charCodeAt(i), 8);
    }
  }
};

QR.QRMode = { MODE_8BIT_BYTE: 1 << 2 };

QR.QRBitBuffer = function() { this.buffer = []; this.length = 0; };
QR.QRBitBuffer.prototype = {
  get: function(index) { return (this.buffer[Math.floor(index / 8)] >>> (7 - index % 8)) & 1; },
  put: function(num, length) {
    for (var i = 0; i < length; i++) { this.buffer.push((num >>> (length - i - 1)) & 1); }
    this.length += length;
  },
  getLengthInBits: function() { return this.length; }
};

QR.QRCode._createData = function(typeNumber, errorCorrectLevel, dataList) {
  var rsBlocks = QR.QRRSBlock.getRSBlocks(typeNumber, errorCorrectLevel);
  var bitBuffer = new QR.QRBitBuffer();
  for (var i = 0; i < dataList.length; i++) {
    var data = dataList[i];
    bitBuffer.put(data.mode, 4);
    bitBuffer.put(data.getLength(), QR.QRUtil.getLengthInBits(data.mode, typeNumber));
    data.write(bitBuffer);
  }
  var totalDataCount = 0;
  for (var i = 0; i < rsBlocks.length; i++) totalDataCount += rsBlocks[i].dataCount;
  if (bitBuffer.getLengthInBits() > totalDataCount * 8) throw new Error("code length overflow");
  if (bitBuffer.getLengthInBits() + 4 <= totalDataCount * 8) bitBuffer.put(0, 4);
  while (bitBuffer.getLengthInBits() % 8 != 0) bitBuffer.put(0, 1);
  while (true) {
    if (bitBuffer.getLengthInBits() >= totalDataCount * 8) break;
    bitBuffer.put(QR.QRCode.PAD0, 8);
    if (bitBuffer.getLengthInBits() >= totalDataCount * 8) break;
    bitBuffer.put(QR.QRCode.PAD1, 8);
  }
  return QR.QRCode._createBytes(bitBuffer, rsBlocks);
};

QR.QRCode.PAD0 = 0xEC;
QR.QRCode.PAD1 = 0x11;

QR.QRCode._createBytes = function(bitBuffer, rsBlocks) {
  var offset = 0, maxDcCount = 0, maxEcCount = 0;
  var dcdata = new Array(rsBlocks.length), ecdata = new Array(rsBlocks.length);
  for (var r = 0; r < rsBlocks.length; r++) {
    var dcCount = rsBlocks[r].dataCount, ecCount = rsBlocks[r].totalCount - dcCount;
    maxDcCount = Math.max(maxDcCount, dcCount);
    maxEcCount = Math.max(maxEcCount, ecCount);
    dcdata[r] = new Array(dcCount);
    for (var i = 0; i < dcdata[r].length; i++) dcdata[r][i] = 0xff & bitBuffer.buffer[i + offset];
    offset += dcCount;
    var rsPoly = QR.QRUtil.getErrorCorrectPolynomial(ecCount);
    var rawPoly = new QR.QRPolynomial(dcdata[r], rsPoly.getLength() - 1);
    var modPoly = rawPoly.mod(rsPoly);
    ecdata[r] = new Array(rsPoly.getLength() - 1);
    for (var i = 0; i < ecdata[r].length; i++) ecdata[r][i] = modPoly.get(i);
  }
  var totalCodeCount = 0;
  for (var i = 0; i < rsBlocks.length; i++) totalCodeCount += rsBlocks[i].totalCount;
  var data = new Array(totalCodeCount);
  var index = 0;
  for (var i = 0; i < maxDcCount; i++) {
    for (var r = 0; r < rsBlocks.length; r++) {
      if (i < dcdata[r].length) data[index++] = dcdata[r][i];
    }
  }
  for (var i = 0; i < maxEcCount; i++) {
    for (var r = 0; r < rsBlocks.length; r++) {
      if (i < ecdata[r].length) data[index++] = ecdata[r][i];
    }
  }
  return data;
};

QR.QRRSBlock.getRSBlocks = function(typeNumber, errorCorrectLevel) {
  var rsBlock = QR.QRRSBlock.getRsBlockTable(typeNumber, errorCorrectLevel);
  if (rsBlock == undefined) throw new Error("bad rs block @ typeNumber:" + typeNumber);
  var length = rsBlock.length / 3, list = [];
  for (var i = 0; i < length; i++) {
    var count = rsBlock[i * 3 + 0], totalCount = rsBlock[i * 3 + 1], dataCount = rsBlock[i * 3 + 2];
    for (var j = 0; j < count; j++) list.push(new QR.QRRSBlock(totalCount, dataCount));
  }
  return list;
};

QR.QRRSBlock.getRsBlockTable = function(typeNumber, errorCorrectLevel) {
  switch(errorCorrectLevel) {
    case QR.QRErrorCorrectLevel.L: return QR.QRRSBlock.RS_BLOCK_TABLE[(typeNumber - 1) * 4 + 0];
    case QR.QRErrorCorrectLevel.M: return QR.QRRSBlock.RS_BLOCK_TABLE[(typeNumber - 1) * 4 + 1];
    case QR.QRErrorCorrectLevel.Q: return QR.QRRSBlock.RS_BLOCK_TABLE[(typeNumber - 1) * 4 + 2];
    case QR.QRErrorCorrectLevel.H: return QR.QRRSBlock.RS_BLOCK_TABLE[(typeNumber - 1) * 4 + 3];
    default: return undefined;
  }
};

QR.QRRSBlock = function(totalCount, dataCount) {
  this.totalCount = totalCount;
  this.dataCount = dataCount;
};

QR.QRUtil = {};
QR.QRUtil.getLengthInBits = function(mode, type) {
  if (1 <= type && type < 10) return 8;
  else if (type < 27) return 16;
  else return 16;
};

QR.QRUtil.getErrorCorrectPolynomial = function(errorCorrectLength) {
  var a = new QR.QRPolynomial([1], 0);
  for (var i = 0; i < errorCorrectLength; i++) a = a.multiply(new QR.QRPolynomial([1, QR.QRMath.gexp(i)], 0));
  return a;
};

QR.QRMath = {};
QR.QRMath.glog = function(n) {
  if (n < 1) throw new Error("glog(" + n + ")");
  return QR.QRMath.LOG_TABLE[n];
};
QR.QRMath.gexp = function(n) {
  while (n < 0) n += 255;
  while (n >= 256) n -= 255;
  return QR.QRMath.EXP_TABLE[n];
};
QR.QRMath.EXP_TABLE = new Array(256);
QR.QRMath.LOG_TABLE = new Array(256);
for (var i = 0; i < 8; i++) QR.QRMath.EXP_TABLE[i] = 1 << i;
for (var i = 8; i < 256; i++) QR.QRMath.EXP_TABLE[i] = QR.QRMath.EXP_TABLE[i - 4] ^ QR.QRMath.EXP_TABLE[i - 5] ^ QR.QRMath.EXP_TABLE[i - 6] ^ QR.QRMath.EXP_TABLE[i - 8];
for (var i = 0; i < 255; i++) QR.QRMath.LOG_TABLE[QR.QRMath.EXP_TABLE[i]] = i;

QR.QRPolynomial = function(num, shift) {
  if (num.length == undefined) throw new Error(num.length + "/" + shift);
  var offset = 0;
  while (offset < num.length && num[offset] == 0) offset++;
  this.num = new Array(num.length - offset + shift);
  for (var i = 0; i < num.length - offset; i++) this.num[i] = num[i + offset];
};
QR.QRPolynomial.prototype = {
  get: function(index) { return this.num[index]; },
  getLength: function() { return this.num.length; },
  multiply: function(e) {
    var num = new Array(this.getLength() + e.getLength() - 1);
    for (var i = 0; i < this.getLength(); i++) {
      for (var j = 0; j < e.getLength(); j++) {
        num[i + j] ^= QR.QRMath.gexp(QR.QRMath.glog(this.get(i)) + QR.QRMath.glog(e.get(j)));
      }
    }
    return new QR.QRPolynomial(num, 0);
  },
  mod: function(e) {
    if (this.getLength() - e.getLength() < 0) return this;
    var ratio = QR.QRMath.glog(this.get(0)) - QR.QRMath.glog(e.get(0));
    var num = new Array(this.getLength());
    for (var i = 0; i < this.getLength(); i++) num[i] = this.get(i);
    for (var i = 0; i < e.getLength(); i++) num[i] ^= QR.QRMath.gexp(QR.QRMath.glog(e.get(i)) + ratio);
    return (new QR.QRPolynomial(num, 0)).mod(e);
  }
};

QR.QRCode._getLostPoint = function(qrCode) {
  var moduleCount = qrCode.getModuleCount(), lostPoint = 0;
  for (var row = 0; row < moduleCount; row++) {
    for (var col = 0; col < moduleCount; col++) {
      var sameCount = 0, dark = qrCode.isDark(row, col);
      for (var r = -1; r <= 1; r++) {
        if (row + r < 0 || moduleCount <= row + r) continue;
        for (var c = -1; c <= 1; c++) {
          if (col + c < 0 || moduleCount <= col + c) continue;
          if (r == 0 && c == 0) continue;
          if (dark == qrCode.isDark(row + r, col + c)) sameCount++;
        }
      }
      if (sameCount > 5) lostPoint += (3 + sameCount - 5);
    }
  }
  for (var row = 0; row < moduleCount - 1; row++) {
    for (var col = 0; col < moduleCount - 1; col++) {
      var count = 0;
      if (qrCode.isDark(row, col)) count++;
      if (qrCode.isDark(row + 1, col)) count++;
      if (qrCode.isDark(row, col + 1)) count++;
      if (qrCode.isDark(row + 1, col + 1)) count++;
      if (count == 0 || count == 4) { lostPoint += 3; }
    }
  }
  for (var row = 0; row < moduleCount; row++) {
    for (var col = 0; col < moduleCount - 6; col++) {
      if (qrCode.isDark(row, col) && !qrCode.isDark(row, col + 1) && qrCode.isDark(row, col + 2) && qrCode.isDark(row, col + 3) && qrCode.isDark(row, col + 4) && !qrCode.isDark(row, col + 5) && qrCode.isDark(row, col + 6)) {
        lostPoint += 40;
      }
    }
  }
  for (var col = 0; col < moduleCount; col++) {
    for (var row = 0; row < moduleCount - 6; row++) {
      if (qrCode.isDark(row, col) && !qrCode.isDark(row + 1, col) && qrCode.isDark(row + 2, col) && qrCode.isDark(row + 3, col) && qrCode.isDark(row + 4, col) && !qrCode.isDark(row + 5, col) && qrCode.isDark(row + 6, col)) {
        lostPoint += 40;
      }
    }
  }
  var darkCount = 0;
  for (var col = 0; col < moduleCount; col++) {
    for (var row = 0; row < moduleCount; row++) {
      if (qrCode.isDark(row, col)) darkCount++;
    }
  }
  var ratio = Math.abs(100 * darkCount / moduleCount / moduleCount - 50) / 5;
  lostPoint += ratio * 10;
  return lostPoint;
};

// Canvas renderer
function renderQRToCanvas(canvas, qrCode, cellSize, margin) {
  margin = margin || 4;
  cellSize = cellSize || 4;
  var size = qrCode.getModuleCount() * cellSize + margin * 2;
  canvas.width = size;
  canvas.height = size;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, size, size);
  ctx.fillStyle = '#000000';
  for (var row = 0; row < qrCode.getModuleCount(); row++) {
    for (var col = 0; col < qrCode.getModuleCount(); col++) {
      if (qrCode.isDark(row, col)) {
        ctx.fillRect(col * cellSize + margin, row * cellSize + margin, cellSize, cellSize);
      }
    }
  }
  return canvas;
}

// Generate QR code from text
function generateQR(text) {
  var typeNumber = text.length > 200 ? 6 : text.length > 100 ? 4 : 2;
  var qr = new QR.QRCode(typeNumber, QR.QRErrorCorrectLevel.M);
  qr.addData(text);
  qr.make();
  return qr;
}

// Main - fetch and display QR
async function loadQR() {
  var container = document.getElementById('qr-container');
  var statusEl = document.getElementById('status');
  var dataDisplay = document.getElementById('qr-data-display');
  
  container.innerHTML = '';
  container.className = 'loading';
  statusEl.textContent = '⏳ 正在加载QR数据...';
  statusEl.className = 'status loading';
  
  try {
    var resp = await fetch('qr_raw.txt?_t=' + Date.now());
    if (!resp.ok) {
      statusEl.textContent = '⏳ 等待QR数据 (HTTP ' + resp.status + ')...';
      return;
    }
    var raw = await resp.text();
    var qrText = raw.trim();
    
    if (!qrText || qrText.length < 10) {
      statusEl.textContent = '⏳ QR数据太短，等待更新...';
      return;
    }
    
    dataDisplay.textContent = 'QR数据: ' + qrText.substring(0, 50) + '...';
    
    var qr = generateQR(qrText);
    var canvas = document.createElement('canvas');
    renderQRToCanvas(canvas, qr, 6, 6);
    
    container.innerHTML = '';
    container.className = '';
    container.appendChild(canvas);
    statusEl.textContent = '✅ QR码已就绪 - 请用手机WhatsApp扫描';
    statusEl.className = 'status ready';
  } catch(e) {
    statusEl.textContent = '⏳ 加载QR中... (' + e.message + ')';
    statusEl.className = 'status error';
  }
}

loadQR();
setInterval(loadQR, 8000);
</script>
