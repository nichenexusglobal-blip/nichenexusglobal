<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NNG Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0d1117;color:#c9d1d9;padding:20px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:15px;border-bottom:1px solid #30363d}
.header h1{font-size:24px;color:#58a6ff}
.header .time{color:#8b949e;font-size:13px}
.refresh{color:#3fb950;font-size:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:20px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px}
.card h2{font-size:13px;text-transform:uppercase;color:#8b949e;margin-bottom:12px;letter-spacing:0.5px}
.big-number{font-size:36px;font-weight:700;color:#58a6ff}
.big-number.green{color:#3fb950}
.big-number.red{color:#f85149}
.big-number.yellow{color:#d2991d}
.big-number.purple{color:#a371f7}
.subtitle{font-size:12px;color:#8b949e;margin-top:4px}
.bar-container{margin:8px 0}
.bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px}
.bar-label span:last-child{color:#8b949e}
.bar{height:6px;background:#21262d;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width 1s}
.bar-fill.blue{background:#58a6ff}
.bar-fill.green{background:#3fb950}
.bar-fill.red{background:#f85149}
.bar-fill.yellow{background:#d2991d}
.region-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.tag{background:#1f2937;color:#58a6ff;padding:2px 8px;border-radius:12px;font-size:11px;border:1px solid #30363d}
.tag .count{color:#8b949e;margin-left:3px}
.action-list{list-style:none}
.action-list li{font-size:12px;color:#8b949e;padding:4px 0;border-bottom:1px solid #21262d}
.action-list li:last-child{border-bottom:none}
.action-list li::before{content:'▸ ';color:#58a6ff}
.pipeline-bar{display:flex;gap:4px;margin-top:8px}
.pipeline-step{flex:1;text-align:center;font-size:10px;padding:6px 2px;border-radius:4px;background:#21262d;color:#484f58}
.pipeline-step.done{background:#1a3a2a;color:#3fb950}
.pipeline-step.warn{background:#3a2a1a;color:#d2991d}
.pipeline-step.fail{background:#3a1a1a;color:#f85149}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
.status-dot.green{background:#3fb950}
.status-dot.yellow{background:#d2991d;animation:pulse 2s infinite}
.status-dot.red{background:#f85149}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
#loading{opacity:0;transition:opacity 0.3s}
#loading.active{opacity:1}
.chart-row{display:flex;flex-wrap:wrap;gap:16px}
.chart-box{flex:1;min-width:200px}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>⚕ NNG Dashboard</h1>
    <span class="refresh" id="refresh-status">● Live · updating every 30s</span>
  </div>
  <div class="time" id="clock">--</div>
</div>

<div class="grid" id="top-cards"></div>
<div class="grid" id="mid-cards"></div>
<div class="grid" id="bottom-cards"></div>

<script>
const API = 'dashboard_data.json';
let lastUpdate = null;

async function fetchData() {
  try {
    const resp = await fetch(API + '?t=' + Date.now());
    const data = await resp.json();
    lastUpdate = new Date();
    render(data);
    document.getElementById('refresh-status').textContent = 
      '● Live · last update ' + lastUpdate.toLocaleTimeString();
  } catch(e) {
    document.getElementById('refresh-status').textContent = '○ Waiting for data...';
  }
}

function render(d) {
  const clock = document.getElementById('clock');
  clock.textContent = new Date().toLocaleString('en-US', {timeZone:'Asia/Shanghai', hour12:false});
  
  // Top cards
  document.getElementById('top-cards').innerHTML = `
    <div class="card">
      <h2>📧 Emails Today</h2>
      <div class="big-number">${d.emails_sent_today}<span style="font-size:16px;color:#8b949e">/50</span></div>
      <div class="subtitle">Total all time: ${d.emails_sent_total}</div>
      <div class="bar-container">
        <div class="bar-label"><span>Daily target</span><span>${d.emails_sent_today}/50</span></div>
        <div class="bar"><div class="bar-fill ${d.emails_sent_today >= 50 ? 'green' : d.emails_sent_today >= 25 ? 'yellow' : 'red'}" style="width:${Math.min(d.emails_sent_today/50*100,100)}%"></div></div>
      </div>
      <div style="margin-top:8px;font-size:12px">
        <span class="status-dot green"></span> Success: ${d.emails_success_today} &nbsp;
        <span class="status-dot red"></span> Failed: ${d.emails_failed_today}
      </div>
    </div>
    
    <div class="card">
      <h2>🔨 Hammers</h2>
      <div class="big-number purple">${d.hammers}</div>
      <div class="subtitle">${d.hammers_with_pricing} with confirmed pricing</div>
    </div>
    
    <div class="card">
      <h2>🎯 Nails</h2>
      <div class="big-number green">${d.nails_total}</div>
      <div class="subtitle">${d.nails_active} contacted</div>
    </div>
    
    <div class="card">
      <h2>📊 Reply Rate</h2>
      <div class="big-number yellow">${d.replies_today}</div>
      <div class="subtitle">replies today · ${d.bounces_today} bounces</div>
    </div>
  `;
  
  // Mid cards
  document.getElementById('mid-cards').innerHTML = `
    <div class="card">
      <h2>🛡 Discipline Score</h2>
      <div class="bar-container">
        <div class="bar-label"><span>Verification</span><span>${d.discipline.verification_rate}%</span></div>
        <div class="bar"><div class="bar-fill ${d.discipline.verification_rate >= 90 ? 'green' : d.discipline.verification_rate >= 70 ? 'yellow' : 'red'}" style="width:${d.discipline.verification_rate}%"></div></div>
      </div>
      <div class="bar-container">
        <div class="bar-label"><span>Pipeline adherence</span><span>${d.discipline.pipeline_adherence}%</span></div>
        <div class="bar"><div class="bar-fill ${d.discipline.pipeline_adherence >= 90 ? 'green' : d.discipline.pipeline_adherence >= 70 ? 'yellow' : 'red'}" style="width:${d.discipline.pipeline_adherence}%"></div></div>
      </div>
      <div class="subtitle" style="margin-top:8px">Blacklist: ${d.blacklist_total} dead addresses blocked</div>
    </div>
    
    <div class="card">
      <h2>🌍 Countries Covered</h2>
      <div class="big-number" style="font-size:28px">${d.countries_covered}</div>
      <div class="region-tags">
        ${d.countries_list.map(c => `<span class="tag">${c}</span>`).join('')}
      </div>
    </div>
    
    <div class="card">
      <h2>📬 Today by Region</h2>
      ${Object.entries(d.emails_by_region).map(([region, count]) => `
        <div class="bar-container">
          <div class="bar-label"><span>${region}</span><span>${count}</span></div>
          <div class="bar"><div class="bar-fill blue" style="width:${Math.min(count/Math.max(...Object.values(d.emails_by_region))*100,100)}%"></div></div>
        </div>
      `).join('')}
    </div>
    
    <div class="card">
      <h2>⏰ Activity Timeline</h2>
      ${Object.entries(d.emails_by_hour).map(([hour, count]) => `
        <div class="bar-container">
          <div class="bar-label"><span>${hour}</span><span>${count}</span></div>
          <div class="bar"><div class="bar-fill green" style="width:${Math.min(count/5*100,100)}%"></div></div>
        </div>
      `).join('')}
    </div>
  `;
  
  // Bottom cards
  document.getElementById('bottom-cards').innerHTML = `
    <div class="card" style="grid-column:span 2">
      <h2>📋 6-Stage Pipeline Status</h2>
      <div class="pipeline-bar">
        <div class="pipeline-step done">🎯<br>AIM</div>
        <div class="pipeline-step done">🔍<br>RESEARCH</div>
        <div class="pipeline-step ${d.verify_statuses.valid ? 'done' : 'warn'}">✅<br>VERIFY</div>
        <div class="pipeline-step done">📁<br>ARCHIVE</div>
        <div class="pipeline-step done">✏️<br>CUSTOMIZE</div>
        <div class="pipeline-step ${d.emails_sent_today > 0 ? 'done' : 'warn'}">🔫<br>FIRE</div>
      </div>
      <div class="subtitle" style="margin-top:12px">
        Blacklist: ${d.blacklist_total} blocked · 
        Verified today: ${d.emails_success_today} ·
        Failed: ${d.emails_failed_today}
      </div>
    </div>
    
    <div class="card" style="grid-column:span 2">
      <h2>▶ Next Actions</h2>
      <ul class="action-list">
        ${d.next_actions.map(a => `<li>${a}</li>`).join('')}
      </ul>
    </div>
  `;
}

// Initial load + auto-refresh
fetchData();
setInterval(fetchData, 30000);
setInterval(() => document.getElementById('clock').textContent = 
  new Date().toLocaleString('en-US', {timeZone:'Asia/Shanghai', hour12:false}), 1000);
</script>
</body>
</html>
