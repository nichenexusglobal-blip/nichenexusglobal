<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta http-equiv="refresh" content="10">
<title>WhatsApp QR 扫码连接</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:20px}
.card{background:#161b22;border:1px solid #30363d;border-radius:20px;padding:40px 30px;text-align:center;max-width:480px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
h1{color:#25D366;font-size:24px;margin-bottom:6px}
.sub{color:#8b949e;font-size:14px;margin-bottom:20px;line-height:1.5}
#qr-container{background:#fff;border-radius:14px;padding:16px;display:inline-block;margin:0 auto 16px;min-width:300px;min-height:300px;display:flex;align-items:center;justify-content:center}
#qr-container canvas,#qr-container img{max-width:280px;max-height:280px;display:block}
#qr-container.loading::after{content:'⏳ 加载QR码中...';color:#8b949e;font-size:14px}
.status{font-size:14px;margin:10px 0;padding:10px 16px;border-radius:8px;background:#0d1117}
.status.loading{color:#f0883e;border:1px solid #30363d}
.status.ready{color:#25D366;border:1px solid #25D36633}
.status.error{color:#f85149;border:1px solid #f8514933}
.steps{color:#8b949e;font-size:13px;text-align:left;margin-top:16px;padding:16px;background:#0d1117;border-radius:10px;line-height:2}
.steps strong{color:#c9d1d9}
.footer{color:#484f58;font-size:11px;margin-top:16px}
button{background:#238636;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer;margin-top:12px}
button:hover{background:#2ea043}
</style>
</head>
<body>
<div class="card">
  <h1>📱 WhatsApp Bridge</h1>
  <p class="sub">Scan this QR code with your phone to link WhatsApp</p>
  <div id="qr-container" class="loading"></div>
  <div id="status" class="status loading">⏳ 等待QR数据...</div>
  <div class="steps">
    <strong>步骤：</strong><br>
    1. 打开手机 WhatsApp<br>
    2. 点 Linked Devices → Link a Device<br>
    3. 扫描上面的二维码<br>
    4. 等待显示 ✅ Connected
  </div>
  <div class="footer">Auto-refreshes every 8 seconds</div>
  <button onclick="location.reload()">🔄 手动刷新</button>
</div>

function renderQRToCanvas(canvas,qr,cs,mg){mg=mg||4;cs=cs||4;var sz=qr.getModuleCount()*cs+mg*2;canvas.width=sz;canvas.height=sz;var ctx=canvas.getContext('2d');ctx.fillStyle='#ffffff';ctx.fillRect(0,0,sz,sz);ctx.fillStyle='#000000';for(var r=0;r<qr.getModuleCount();r++){for(var c=0;c<qr.getModuleCount();c++){if(qr.isDark(r,c)){ctx.fillRect(c*cs+mg,r*cs+mg,cs,cs)}}}return canvas}

function generateQR(text){var tn=text.length>200?6:text.length>100?4:2;var qr=new QR.QRCode(tn,QR.QRErrorCorrectLevel.M);qr.addData(text);qr.make();return qr}

async function loadQR(){
  var c=document.getElementById('qr-container'),s=document.getElementById('status');
  c.innerHTML='';c.className='loading';s.textContent='⏳ 正在加载QR数据...';s.className='status loading';
  try{
    var r=await fetch('qr_raw.txt?_t='+Date.now());
    if(!r.ok){s.textContent='⏳ 等待QR数据 (HTTP '+r.status+')...';return}
    var t=(await r.text()).trim();
    if(!t||t.length<10){s.textContent='⏳ QR数据太短，等待更新...';return}
    var qr=generateQR(t);var ca=document.createElement('canvas');renderQRToCanvas(ca,qr,6,6);
    c.innerHTML='';c.className='';c.appendChild(ca);
    s.textContent='✅ QR码已就绪 - 请用手机WhatsApp扫描';s.className='status ready';
  }catch(e){s.textContent='⏳ 加载中... ('+e.message+')';s.className='status error'}
}
loadQR();setInterval(loadQR,8000);
</script>
