<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WhatsApp QR - Real-time</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box}
body{background:#0d1117;display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100vh;margin:0;padding:20px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.card{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:40px;text-align:center;max-width:500px;width:100%}
h2{color:#25D366;font-size:22px;margin:0 0 8px 0}
.sub{color:#8b949e;font-size:14px;margin:0 0 24px 0;line-height:1.5}
#qr-wrapper{background:#fff;border-radius:12px;padding:16px;display:inline-block;margin:0 auto}
#qr-wrapper canvas{display:block}
#qr-placeholder{color:#666;padding:80px 20px;min-width:250px;font-size:14px}
.steps{color:#8b949e;font-size:13px;margin-top:20px;text-align:left;line-height:1.8}
.steps strong{color:#c9d1d9}
#status{font-size:13px;margin-top:14px;padding:6px 14px;border-radius:8px;display:inline-block}
#status.connecting{color:#f0883e;background:#2d1b00}
#status.ready{color:#3fb950;background:#0b2d1a}
#status.error{color:#f85149;background:#2d0f0d}
.timer{color:#484f58;font-size:11px;margin-top:8px}
.code-text{color:#484f58;font-size:10px;margin-top:6px;word-break:break-all;max-width:350px;display:none}
</style>
</head>
<body>
<div class="card">
  <h2>📱 WhatsApp Bridge</h2>
  <p class="sub">Auto-fetching QR data from bridge every 5 seconds</p>
  <div id="qr-wrapper">
    <div id="qr-placeholder">Waiting for QR code from bridge...</div>
  </div>
  <div id="status" class="connecting">⏳ Fetching QR data...</div>
  <div class="steps">
    <strong>如何扫码：</strong><br>
    1. 打开手机 WhatsApp<br>
    2. Linked Devices → Link a Device<br>
    3. 扫这个二维码（码每5秒自动更新）<br>
    4. 等待显示 ✅ Connected
  </div>
  <div class="timer" id="timer">Fetching...</div>
  <div class="code-text" id="rawDisplay"></div>
</div>

<script>
let currentQRCode = null;
let fetchCount = 0;

function fetchAndDisplayQR() {
  fetchCount++;
  document.getElementById('status').textContent = '⏳ Fetching QR data... (#fetchCount)'.replace('#fetchCount', fetchCount);
  document.getElementById('status').className = 'connecting';

  fetch('qr_raw.txt?_=' + Date.now())
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(raw => {
      const text = raw.trim();
      if (!text || text.length < 10) {
        document.getElementById('status').textContent = '⏳ Empty QR data, retrying...';
        return;
      }

      // Update raw display
      const display = document.getElementById('rawDisplay');
      display.textContent = 'QR: ' + text.substring(0, 40) + '...';
      display.style.display = 'block';

      // Remove old QR
      const wrapper = document.getElementById('qr-wrapper');
      const placeholder = document.getElementById('qr-placeholder');
      if (placeholder) placeholder.remove();

      if (currentQRCode) {
        currentQRCode.clear();
        wrapper.innerHTML = '';
      }

      // Generate new QR
      currentQRCode = new QRCode(wrapper, {
        text: text,
        width: 280,
        height: 280,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.L
      });

      document.getElementById('status').textContent = '✅ QR ready - Scan now! (updated)';
      document.getElementById('status').className = 'ready';
    })
    .catch(err => {
      if (fetchCount < 5) {
        document.getElementById('status').textContent = '⏳ Retrying to fetch QR data... (' + fetchCount + ')';
      } else {
        document.getElementById('status').textContent = '⚠️ Cannot reach bridge - is it running? (' + err.message + ')';
        document.getElementById('status').className = 'error';
      }
    });
}

// Fetch immediately, then every 5 seconds
fetchAndDisplayQR();
setInterval(fetchAndDisplayQR, 5000);

// Timer display
let seconds = 0;
setInterval(() => {
  seconds++;
  document.getElementById('timer').textContent = 'Auto-refresh every 5s | Running ' + seconds + 's';
}, 1000);
</script>
</body>
</html>
